<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${displayName ?: 'User Identity Provider'} + ' - Consent'">User Identity Provider - Consent</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .consent-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            width: 100%;
            max-width: 500px;
        }
        .consent-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .consent-header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }
        .consent-header p {
            color: #666;
            font-size: 14px;
        }
        .consent-info {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
        }
        .consent-info h2 {
            color: #333;
            font-size: 18px;
            margin-bottom: 15px;
        }
        .consent-info p {
            color: #666;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 10px;
        }
        .consent-info .scope {
            display: inline-block;
            background: #11998e;
            color: white;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            margin-right: 5px;
            margin-bottom: 5px;
        }
        .button-group {
            display: flex;
            gap: 10px;
        }
        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-approve {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
        }
        .btn-approve:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(17, 153, 142, 0.4);
        }
        .btn-deny {
            background: #f5f5f5;
            color: #333;
        }
        .btn-deny:hover {
            background: #e0e0e0;
        }
        .btn:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <div class="consent-container">
        <div class="consent-header">
            <h1>Authorization Consent</h1>
            <p th:text="${displayName ?: 'User dentity Provider'}">User Identity Provider</p>
        </div>

        <div class="consent-info">
            <h2>Authorize Access</h2>
            <p>An application is requesting access to your account and the following permissions:</p>
            <div>
                <span class="scope">openid</span>
                <span class="scope">profile</span>
                <span class="scope">email</span>
            </div>
            <p style="margin-top: 15px;">By clicking "Approve", you allow this application to access your information.</p>
        </div>

        <div class="button-group">
            <form method="post" action="/oauth2/authorize" style="flex: 1;">
                <input type="hidden" name="action" value="approve">
                <input type="hidden" name="response_type" value="code">
                <input type="hidden" name="client_id" th:value="${clientId}">
                <input type="hidden" name="redirect_uri" th:value="${redirectUri}">
                <input type="hidden" name="scope" th:value="${scopes}">
                <input type="hidden" name="state" th:value="${state}">
                <button type="submit" class="btn btn-approve" style="width: 100%;">Approve</button>
            </form>
            <a href="/oauth2/logout" class="btn btn-deny" style="display: inline-flex; align-items: center; justify-content: center; text-decoration: none;">Deny</a>
        </div>
    </div>
</body>
</html>
