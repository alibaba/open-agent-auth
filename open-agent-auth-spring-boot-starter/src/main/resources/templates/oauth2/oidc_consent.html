<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${displayName ?: 'User Identity Provider'} + ' - Consent'">User Identity Provider - Consent</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #FAFAF8;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .consent-container {
            background: #FFFFFF;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
            padding: 40px;
            width: 100%;
            max-width: 480px;
            animation: slideUp 0.5s ease-out 0.1s both;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .consent-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .consent-header h1 {
            color: #1A1A1A;
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        .consent-header p {
            color: #8A8A8A;
            font-size: 15px;
            font-weight: 400;
        }

        .consent-info {
            background: #F5F3EF;
            padding: 24px;
            border-radius: 12px;
            margin-bottom: 32px;
            border-left: 4px solid #B8860B;
        }

        .consent-info h2 {
            color: #1A1A1A;
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 16px;
            letter-spacing: -0.3px;
        }

        .consent-info p {
            color: #4A4A4A;
            font-size: 14px;
            line-height: 1.7;
            margin-bottom: 12px;
        }

        .consent-info .scopes-container {
            margin: 16px 0;
        }

        .consent-info .scope {
            display: inline-block;
            background: rgba(184, 134, 11, 0.1);
            color: #B8860B;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            margin-right: 8px;
            margin-bottom: 8px;
            border: 1px solid rgba(184, 134, 11, 0.2);
            transition: all 0.2s ease;
        }

        .consent-info .scope:hover {
            background: rgba(184, 134, 11, 0.15);
            transform: translateY(-1px);
        }

        .button-group {
            display: flex;
            gap: 12px;
        }

        .btn {
            flex: 1;
            padding: 14px 20px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'DM Sans', sans-serif;
        }

        .btn-approve {
            background: #1A1A1A;
            color: #FFFFFF;
        }

        .btn-approve:hover {
            background: #333333;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(26, 26, 26, 0.15);
        }

        .btn-approve:active {
            transform: translateY(0);
        }

        .btn-deny {
            background: transparent;
            color: #4A4A4A;
            border: 1px solid #D4CFC8;
        }

        .btn-deny:hover {
            background: #F5F3EF;
            border-color: #C8C3BC;
            color: #1A1A1A;
        }

        .btn-deny:active {
            background: #EBE7E1;
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
            pointer-events: none;
        }

        .btn .btn-spinner {
            display: none;
            width: 16px;
            height: 16px;
            border: 2px solid transparent;
            border-top-color: currentColor;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        .btn.is-loading .btn-spinner {
            display: inline-block;
        }

        .btn.is-loading .btn-label {
            display: none;
        }

        .btn.is-loading .btn-loading-text {
            display: inline;
        }

        .btn .btn-loading-text {
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="consent-container">
        <div class="consent-header">
            <h1>Authorization Consent</h1>
            <p th:text="${displayName ?: 'User dentity Provider'}">User Identity Provider</p>
        </div>

        <div class="consent-info">
            <h2>Authorize Access</h2>
            <p>An application is requesting access to your account and the following permissions:</p>
            <div>
                <span class="scope">openid</span>
                <span class="scope">profile</span>
                <span class="scope">email</span>
            </div>
            <p style="margin-top: 15px;">By clicking "Approve", you allow this application to access your information.</p>
        </div>

        <div class="button-group">
            <form method="post" action="/oauth2/authorize" style="flex: 1;">
                <input type="hidden" name="action" value="approve">
                <input type="hidden" name="response_type" value="code">
                <input type="hidden" name="client_id" th:value="${clientId}">
                <input type="hidden" name="redirect_uri" th:value="${redirectUri}">
                <input type="hidden" name="scope" th:value="${scopes}">
                <input type="hidden" name="state" th:value="${state}">
                <button type="submit" class="btn btn-approve" style="width: 100%;">
                    <span class="btn-spinner"></span>
                    <span class="btn-label">Approve</span>
                    <span class="btn-loading-text">Approving…</span>
                </button>
            </form>
            <a href="/oauth2/logout" class="btn btn-deny" style="display: inline-flex; align-items: center; justify-content: center; text-decoration: none;">Deny</a>
        </div>
    </div>

    <script>
        document.querySelectorAll('form').forEach(function(form) {
            form.addEventListener('submit', function(event) {
                var clickedButton = event.submitter || document.activeElement;
                if (clickedButton && clickedButton.name && clickedButton.value) {
                    var hiddenInput = document.createElement('input');
                    hiddenInput.type = 'hidden';
                    hiddenInput.name = clickedButton.name;
                    hiddenInput.value = clickedButton.value;
                    form.appendChild(hiddenInput);
                }
                var buttons = form.querySelectorAll('button[type="submit"]');
                buttons.forEach(function(button) {
                    button.disabled = true;
                    if (button === clickedButton) {
                        button.classList.add('is-loading');
                    }
                });
                var denyLink = document.querySelector('.btn-deny');
                if (denyLink) {
                    denyLink.style.pointerEvents = 'none';
                    denyLink.style.opacity = '0.6';
                }
            });
        });
    </script>
</body>
</html>
