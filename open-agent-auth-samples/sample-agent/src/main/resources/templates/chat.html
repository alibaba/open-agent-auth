<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Open Agent Auth Chat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        /* ============================================
           Design System - Design Tokens
           ============================================ */
        :root {
            /* Color Palette - Primary (Warm Amber) */
            --color-primary-50: #FFF8F0;
            --color-primary-100: #FFEFD6;
            --color-primary-200: #FFE0B2;
            --color-primary-300: #FFD08A;
            --color-primary-400: #D4A574;
            --color-primary-500: #B8860B;
            --color-primary-600: #8B6914;
            --color-primary-700: #6B5010;
            --color-primary-800: #4A370B;
            --color-primary-900: #2A1F06;
            
            /* Color Palette - Semantic */
            --color-success: #5B8C5A;
            --color-success-light: rgba(91, 140, 90, 0.1);
            --color-warning: #D4A574;
            --color-warning-light: rgba(212, 165, 116, 0.1);
            --color-error: #C75050;
            --color-error-light: rgba(199, 80, 80, 0.08);
            --color-info: #B8860B;
            --color-info-light: rgba(184, 134, 11, 0.08);
            
            /* Color Palette - Neutral (Light Theme) */
            --color-gray-50: #FAFAF8;
            --color-gray-100: #F5F3EF;
            --color-gray-200: #E8E4DF;
            --color-gray-300: #D4CFC8;
            --color-gray-400: #B0ABA5;
            --color-gray-500: #8A8A8A;
            --color-gray-600: #6B6B6B;
            --color-gray-700: #4A4A4A;
            --color-gray-800: #2D2D2D;
            --color-gray-900: #1A1A1A;
            
            /* Typography */
            --font-family-base: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            --font-family-mono: 'JetBrains Mono', 'SF Mono', 'Menlo', 'Monaco', monospace;
            
            --font-size-xs: 0.75rem;
            --font-size-sm: 0.875rem;
            --font-size-base: 1rem;
            --font-size-lg: 1.125rem;
            --font-size-xl: 1.25rem;
            --font-size-2xl: 1.5rem;
            
            --font-weight-normal: 400;
            --font-weight-medium: 500;
            --font-weight-semibold: 600;
            --font-weight-bold: 700;
            
            --line-height-tight: 1.25;
            --line-height-normal: 1.5;
            --line-height-relaxed: 1.75;
            
            /* Spacing */
            --space-1: 0.25rem;
            --space-2: 0.5rem;
            --space-3: 0.75rem;
            --space-4: 1rem;
            --space-5: 1.25rem;
            --space-6: 1.5rem;
            --space-8: 2rem;
            --space-10: 2.5rem;
            --space-12: 3rem;
            
            /* Border Radius */
            --radius-sm: 0.375rem;
            --radius-md: 0.5rem;
            --radius-lg: 0.75rem;
            --radius-xl: 1rem;
            --radius-2xl: 1.5rem;
            --radius-full: 9999px;
            
            /* Shadows (Warm, subtle) */
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.04);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.08);
            --shadow-xl: 0 12px 32px rgba(0, 0, 0, 0.1);
            
            /* Transitions */
            --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
            --transition-base: 200ms cubic-bezier(0.4, 0, 0.2, 1);
            --transition-slow: 300ms cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        /* ============================================
           Base Styles
           ============================================ */
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            margin: 0;
            padding: 0;
            background: var(--color-gray-50);
            font-family: var(--font-family-base);
            font-size: var(--font-size-base);
            line-height: var(--line-height-normal);
            color: var(--color-gray-700);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }
        
        /* ============================================
           Layout - Three Column Layout
           ============================================ */
        .container {
            width: 100%;
            max-width: 100%;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        
        .main-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
            position: relative;
        }
        
        /* Left Sidebar - Session History */
        .sidebar-left {
            width: 280px;
            background: #FFFFFF;
            border-right: 1px solid var(--color-gray-200);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            transition: all var(--transition-base);
            z-index: 20;
            position: relative;
        }
        
        .sidebar-left.collapsed {
            width: 0;
            overflow: hidden;
        }
        
        /* Center - Chat Container */
        .chat-container {
            flex: 1;
            background: var(--color-gray-50);
            border: none;
            border-radius: 0;
            box-shadow: none;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            min-width: 400px;
            position: relative;
            z-index: 10;
            max-height: none;
            min-height: auto;
            height: 100%;
        }
        
        /* Right Sidebar - Tool Call History */
        .sidebar-right {
            width: 320px;
            background: #FFFFFF;
            border-left: 1px solid var(--color-gray-200);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            transition: all var(--transition-base);
            z-index: 20;
            position: relative;
        }
        
        .sidebar-right.collapsed {
            width: 0;
            overflow: hidden;
        }
        
        @media (max-width: 1200px) {
            .sidebar-left {
                width: 240px;
            }
            
            .sidebar-right {
                width: 280px;
            }
            
            .chat-container {
                min-width: 320px;
            }
        }
        
        @media (max-width: 768px) {
            .main-layout {
                flex-direction: column;
            }
            
            .sidebar-left,
            .sidebar-right {
                width: 100%;
                max-height: 200px;
                border-right: none;
                border-bottom: 1px solid var(--color-gray-300);
                border-left: none;
            }
            
            .sidebar-left.collapsed,
            .sidebar-right.collapsed {
                max-height: 0;
            }
            
            .chat-container {
                flex: 1;
                min-width: 100%;
            }
        }
        
        /* ============================================
           Left Sidebar - Session History Styles
           ============================================ */
        .sidebar-header {
            padding: var(--space-4);
            border-bottom: 1px solid var(--color-gray-200);
            background: #FFFFFF;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: var(--space-3);
        }
        
        .sidebar-header h2 {
            font-size: var(--font-size-base);
            font-weight: var(--font-weight-semibold);
            color: var(--color-gray-800);
            margin: 0;
            display: flex;
            align-items: center;
            gap: var(--space-2);
        }
        
        .sidebar-toggle-btn {
            background: var(--color-gray-200);
            border: 1px solid var(--color-gray-300);
            border-radius: var(--radius-md);
            padding: var(--space-2);
            color: var(--color-gray-700);
            cursor: pointer;
            transition: all var(--transition-fast);
            font-size: var(--font-size-base);
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
        }
        
        .sidebar-toggle-btn:hover {
            background: rgba(0, 240, 255, 0.1);
            border-color: var(--color-primary-500);
            color: var(--color-primary-600);
        }
        
        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: var(--space-3);
        }
        
        .sidebar-content::-webkit-scrollbar {
            width: 4px;
        }
        
        .sidebar-content::-webkit-scrollbar-track {
            background: transparent;
        }
        
        .sidebar-content::-webkit-scrollbar-thumb {
            background: var(--color-gray-300);
            border-radius: var(--radius-full);
        }
        
        /* Session List */
        .session-list {
            display: flex;
            flex-direction: column;
            gap: var(--space-2);
        }
        
        .session-item {
            background: transparent;
            border: 1px solid transparent;
            border-radius: var(--radius-lg);
            padding: var(--space-3) var(--space-4);
            cursor: pointer;
            transition: all var(--transition-fast);
            position: relative;
        }
        
        .session-item:hover {
            background: rgba(184, 134, 11, 0.06);
            border-color: transparent;
        }
        
        .session-item.active {
            background: rgba(184, 134, 11, 0.1);
            border-color: transparent;
            border-left: 3px solid var(--color-primary-500);
        }
        
        .session-item-title {
            font-weight: var(--font-weight-medium);
            color: var(--color-gray-800);
            font-size: var(--font-size-sm);
            margin-bottom: var(--space-1);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .session-item-meta {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: var(--space-2);
            font-size: var(--font-size-xs);
            color: var(--color-gray-500);
        }
        
        .session-item-time {
            display: flex;
            align-items: center;
            gap: var(--space-1);
        }
        
        .session-item-actions {
            display: none;
            gap: var(--space-1);
        }
        
        .session-item:hover .session-item-actions {
            display: flex;
        }
        
        .session-action-btn {
            background: transparent;
            border: none;
            color: var(--color-gray-500);
            padding: var(--space-1);
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all var(--transition-fast);
            font-size: var(--font-size-xs);
        }
        
        .session-action-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--color-gray-700);
        }
        
        .session-action-btn.delete:hover {
            background: rgba(255, 0, 85, 0.1);
            color: var(--color-error);
        }
        
        /* New Session Button */
        .new-session-btn {
            width: 100%;
            background: var(--color-gray-900);
            border: 1px solid var(--color-gray-900);
            border-radius: var(--radius-lg);
            padding: var(--space-3) var(--space-4);
            color: #FFFFFF;
            font-weight: var(--font-weight-semibold);
            transition: all var(--transition-base);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--space-2);
            margin-bottom: var(--space-3);
        }
        
        .new-session-btn:hover {
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
            background: var(--color-gray-800);
        }
        
        .empty-sessions {
            text-align: center;
            padding: var(--space-8) var(--space-4);
            color: var(--color-gray-500);
            font-size: var(--font-size-sm);
        }
        
        .empty-sessions i {
            font-size: var(--font-size-2xl);
            margin-bottom: var(--space-3);
            opacity: 0.5;
        }
        
        /* ============================================
           Right Sidebar - Tool Call History Styles
           ============================================ */
        .tool-call-list {
            display: flex;
            flex-direction: column;
            gap: var(--space-3);
        }
        
        .tool-call-item {
            background: transparent;
            border: 1px solid var(--color-gray-200);
            border-radius: var(--radius-lg);
            overflow: hidden;
            transition: all var(--transition-fast);
        }
        
        .tool-call-item:hover {
            background: var(--color-gray-50);
            border-color: var(--color-gray-300);
        }
        
        .tool-call-item-header {
            padding: var(--space-3) var(--space-4);
            background: transparent;
            border-bottom: 1px solid var(--color-gray-200);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: var(--space-2);
            cursor: pointer;
        }
        
        .tool-call-item-header:hover {
            background: var(--color-gray-50);
        }
        
        .tool-call-item-title {
            display: flex;
            align-items: center;
            gap: var(--space-2);
            font-weight: var(--font-weight-medium);
            color: var(--color-gray-800);
            font-size: var(--font-size-xs);
            flex: 1;
            min-width: 0;
        }
        
        .tool-call-item-title .tool-name {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .tool-call-item-title .tool-icon {
            font-size: var(--font-size-sm);
            color: var(--color-primary-600);
            flex-shrink: 0;
        }
        
        .tool-call-item-status {
            display: flex;
            align-items: center;
            gap: var(--space-1);
            font-size: var(--font-size-xs);
            font-weight: var(--font-weight-medium);
            padding: var(--space-1) var(--space-2);
            border-radius: var(--radius-full);
        }
        
        .tool-call-item-status.success {
            background: var(--color-success-light);
            color: var(--color-success);
        }
        
        .tool-call-item-status.error {
            background: var(--color-error-light);
            color: var(--color-error);
        }
        
        .tool-call-item-status.pending {
            background: var(--color-warning-light);
            color: var(--color-warning);
        }
        
        .tool-call-item-body {
            padding: var(--space-3) var(--space-4);
            display: none;
            animation: slideDown var(--transition-base) ease-out;
        }
        
        .tool-call-item-body.show {
            display: block;
        }
        
        .tool-call-detail {
            margin-bottom: var(--space-2);
        }
        
        .tool-call-detail:last-child {
            margin-bottom: 0;
        }
        
        .tool-call-detail-label {
            font-weight: var(--font-weight-semibold);
            color: var(--color-gray-600);
            margin-bottom: var(--space-1);
            font-size: var(--font-size-xs);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .tool-call-detail-content {
            background: var(--color-gray-50);
            padding: var(--space-2) var(--space-3);
            border-radius: var(--radius-md);
            font-family: var(--font-family-mono);
            font-size: var(--font-size-xs);
            color: var(--color-gray-700);
            word-break: break-all;
            max-height: 150px;
            overflow-y: auto;
            border: 1px solid var(--color-gray-200);
        }
        
        .tool-call-detail-content::-webkit-scrollbar {
            width: 3px;
        }
        
        .tool-call-detail-content::-webkit-scrollbar-thumb {
            background: var(--color-gray-300);
            border-radius: var(--radius-full);
        }
        
        .tool-call-timestamp {
            font-size: var(--font-size-xs);
            color: var(--color-gray-500);
            margin-top: var(--space-2);
            display: flex;
            align-items: center;
            gap: var(--space-1);
        }
        
        .empty-tool-calls {
            text-align: center;
            padding: var(--space-8) var(--space-4);
            color: var(--color-gray-500);
            font-size: var(--font-size-sm);
        }
        
        .empty-tool-calls i {
            font-size: var(--font-size-2xl);
            margin-bottom: var(--space-3);
            opacity: 0.5;
        }
        
        .tool-call-item-toggle {
            transition: transform var(--transition-base);
            color: var(--color-gray-400);
            font-size: var(--font-size-xs);
            flex-shrink: 0;
        }
        
        .tool-call-item-toggle.rotated {
            transform: rotate(90deg);
            color: var(--color-primary-600);
        }
        
        /* ============================================
           Header
           ============================================ */
        .chat-header {
            background: #FFFFFF;
            color: var(--color-gray-800);
            padding: var(--space-4) var(--space-5);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            position: relative;
            z-index: 10;
            border-bottom: 1px solid var(--color-gray-200);
        }
        
        .chat-header .header-actions {
            display: flex;
            gap: var(--space-2);
        }
        
        .chat-header .header-btn {
            background: var(--color-gray-100);
            border: 1px solid var(--color-gray-200);
            color: var(--color-gray-700);
            width: 32px;
            height: 32px;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all var(--transition-fast);
            font-size: var(--font-size-base);
        }
        
        .chat-header .header-content {
            display: flex;
            align-items: center;
            gap: var(--space-3);
        }
        
        .chat-header .header-icon {
            width: 40px;
            height: 40px;
            background: var(--color-primary-500);
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: var(--font-size-xl);
            color: white;
        }
        
        .chat-header .header-title {
            font-size: var(--font-size-lg);
            font-weight: var(--font-weight-semibold);
            margin: 0;
            color: var(--color-gray-900);
        }
        
        .chat-header .header-subtitle {
            font-size: var(--font-size-sm);
            opacity: 0.7;
            margin: 0;
            color: var(--color-gray-500);
        }
        
        .chat-header .header-actions {
            display: flex;
            gap: var(--space-2);
        }
        
        .chat-header .header-btn {
            background: var(--color-gray-100);
            border: 1px solid var(--color-gray-200);
            color: var(--color-gray-700);
            width: 32px;
            height: 32px;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all var(--transition-fast);
            font-size: var(--font-size-base);
        }
        
        .chat-header .header-btn:hover {
            background: var(--color-gray-200);
            border-color: var(--color-gray-300);
            color: var(--color-gray-800);
            transform: translateY(-1px);
        }
        
        .chat-header .header-btn:active {
            transform: translateY(0);
        }
        
        @media (max-width: 768px) {
            .chat-header {
                padding: var(--space-4);
            }
            
            .chat-header .header-subtitle {
                display: none;
            }
        }
        
        /* ============================================
           Chat Messages
           ============================================ */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: var(--space-6);
            background: var(--color-gray-50);
            scroll-behavior: smooth;
        }
        
        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }
        
        .chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }
        
        .chat-messages::-webkit-scrollbar-thumb {
            background: var(--color-gray-300);
            border-radius: var(--radius-full);
        }
        
        .chat-messages::-webkit-scrollbar-thumb:hover {
            background: var(--color-gray-400);
        }
        
        @media (max-width: 768px) {
            .chat-messages {
                padding: var(--space-4);
            }
        }
        
        /* ============================================
           Message Styles
           ============================================ */
        .message {
            margin-bottom: var(--space-5);
            animation: messageSlideIn var(--transition-slow) cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        @keyframes messageSlideIn {
            from {
                opacity: 0;
                transform: translateY(16px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .message-user {
            display: flex;
            justify-content: flex-end;
            align-items: flex-start;
            gap: var(--space-3);
        }
        
        .message-user .message-avatar {
            order: 2;
            margin-left: 0;
        }
        
        .message-user .message-bubble {
            order: 1;
            max-width: calc(100% - 48px);
            min-width: fit-content;
        }
        
        .message-assistant {
            display: flex;
            justify-content: flex-start;
            align-items: flex-start;
            gap: var(--space-3);
        }
        
        .message-tool {
            display: flex;
            justify-content: center;
            margin: var(--space-4) 0;
        }
        
        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: var(--radius-full);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: var(--font-size-lg);
            flex-shrink: 0;
        }
        
        .message-user .message-avatar {
            background: var(--color-primary-500);
            color: white;
        }
        
        .message-assistant .message-avatar {
            background: var(--color-success);
            color: white;
        }
        
        .message-bubble {
            display: inline-block;
            max-width: calc(100% - 48px);
            min-width: 200px;
            padding: var(--space-4) var(--space-5);
            border-radius: var(--radius-2xl);
            word-wrap: break-word;
            position: relative;
            box-shadow: var(--shadow-sm);
            white-space: normal;
            line-height: 1.5;
        }
        
        .message-user .message-bubble {
            background: var(--color-gray-900);
            color: #FFFFFF;
            border: none;
            border-bottom-right-radius: var(--radius-md);
            box-shadow: var(--shadow-sm);
        }
        
        .message-user .message-bubble a {
            color: rgba(255, 255, 255, 0.9);
            text-decoration: underline;
        }
        
        .message-assistant .message-bubble {
            background: #FFFFFF;
            color: var(--color-gray-700);
            border: 1px solid var(--color-gray-200);
            border-bottom-left-radius: var(--radius-md);
            box-shadow: var(--shadow-sm);
        }
        
        .message-assistant .message-bubble a {
            color: var(--color-primary-500);
            text-decoration: none;
        }
        
        .message-assistant .message-bubble a:hover {
            text-decoration: underline;
        }
        
        @media (max-width: 768px) {
            .message-bubble {
                max-width: 85%;
                padding: var(--space-3) var(--space-4);
            }
            
            .message-avatar {
                width: 32px;
                height: 32px;
                font-size: var(--font-size-base);
            }
        }
        
        /* ============================================
           Markdown Styles
           ============================================ */
        .message-assistant .message-bubble h1,
        .message-assistant .message-bubble h2,

            /* Unified Action Card Styles (Tool Call + Authorization) */
        .action-card {

        .action-card-header {
            padding: var(--space-4);
            border-bottom: 1px solid var(--color-gray-200);

            align-items: center;

        .action-card-title .icon.tool {

        /* Auth badge in header */

            display: inline-flex;
            align-items: center;
            justify-content: center;

            border-radius: var(--radius-full);
            font-size: var(--font-size-xs);
            margin-left: var(--space-2);
        }
        
        .auth-badge.required {
            background: var(--color-warning-light);
            color: var(--color-warning);
        }
        
        .auth-badge.initiated {
            background: var(--color-info-light);
            color: var(--color-info);
        }
        
        .auth-badge.authorized {
            background: var(--color-success-light);
            color: var(--color-success);

        .auth-badge.denied,

        .action-card-toggle {

        .action-card-body {
            padding: var(--space-4);

            animation: slideDown var(--transition-base) ease-out;
