        .action-card-body.show {
            display: block;
        }
        
        .action-card-section {
            margin-bottom: var(--space-4);
        }
        
        .action-card-section:last-child {
            margin-bottom: 0;
        }
        
        .action-card-section-title {
            font-weight: var(--font-weight-semibold);
            color: var(--color-gray-600);
            margin-bottom: var(--space-2);
            font-size: var(--font-size-xs);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: var(--space-2);
        }
        
        .action-card-section-title i {
            font-size: var(--font-size-sm);
            color: var(--color-gray-500);
        }
        
        /* Authorization section specific styles */
        .action-card-section.auth-section {
            background: var(--color-gray-100);
            border-radius: var(--radius-md);
            padding: var(--space-3);
            border: 1px solid var(--color-gray-200);
        }
        
        .auth-status-content {
            background: var(--color-gray-50);
            border: 1px solid var(--color-gray-200);
        }
        
        .auth-status-badge {
            display: flex;
            align-items: center;
            gap: var(--space-2);
            padding: var(--space-2) var(--space-3);
            border-radius: var(--radius-md);
            font-weight: var(--font-weight-medium);
            font-size: var(--font-size-sm);
        }
        
        .auth-status-badge.required {
            background: var(--color-warning-light);
            color: var(--color-warning);
            border: 1px solid var(--color-warning);
        }
        
        .auth-status-badge.initiated {
            background: var(--color-info-light);
            color: var(--color-info);
            border: 1px solid var(--color-info);
        }
        
        .auth-status-badge.authorized {
            background: var(--color-success-light);
            color: var(--color-success);
            border: 1px solid var(--color-success);
        }
        
        .auth-status-badge.denied,
        .auth-status-badge.failed {
            background: var(--color-error-light);
            color: var(--color-error);
            border: 1px solid var(--color-error);
        }
        
        .action-card-section-content {
            background: var(--color-gray-50);
            padding: var(--space-3);
            border-radius: var(--radius-md);
            font-family: var(--font-family-mono);
            font-size: var(--font-size-sm);
            color: var(--color-gray-700);
            word-break: break-all;
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid var(--color-gray-200);
        }
        
        .action-card-section-content.result-content {
            background: var(--color-success-light);
            border-color: var(--color-success);
        }
        
        .action-card-section-content::-webkit-scrollbar {
            width: 4px;
        }
        
        .action-card-section-content::-webkit-scrollbar-thumb {
            background: var(--color-gray-300);
            border-radius: var(--radius-full);
        }
        
        .action-card-auth-external {
            padding: var(--space-3) var(--space-4);
            background: var(--color-gray-100);
            border-top: 1px solid var(--color-gray-200);
            border-bottom: 1px solid var(--color-gray-200);
        }
        
        .action-card-auth-link {
            display: inline-flex;
            align-items: center;
            gap: var(--space-2);
            padding: var(--space-3) var(--space-5);
            background: transparent;
            color: var(--color-primary-500);
            border: 1px solid var(--color-primary-500);
            border-radius: var(--radius-full);
            text-decoration: none;
            font-size: var(--font-size-sm);
            font-weight: var(--font-weight-semibold);
            transition: all var(--transition-base);
            box-shadow: var(--shadow-sm);
            width: 100%;
            justify-content: center;
        }
        
        .action-card-auth-link:hover {
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
            background: var(--color-primary-50);
        }
        
        .authorization-status .status-header {
            display: flex;
            align-items: center;
            gap: var(--space-2);
        }
        
        .authorization-status .status-icon {
            font-size: var(--font-size-xl);
        }
        
        .authorization-status .status-text {
            font-weight: var(--font-weight-semibold);
            color: var(--color-gray-800);
        }
        
        .authorization-status .auth-link {
            display: inline-flex;
            align-items: center;
            gap: var(--space-2);
            padding: var(--space-2) var(--space-4);
            background: transparent;
            color: var(--color-primary-500);
            border: 1px solid var(--color-primary-500);
            border-radius: var(--radius-full);
            text-decoration: none;
            font-size: var(--font-size-sm);
            font-weight: var(--font-weight-semibold);
            transition: all var(--transition-base);
            box-shadow: var(--shadow-sm);
        }
        
        .authorization-status .auth-link:hover {
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
            background: var(--color-primary-50);
        }
        
        .authorization-status .auth-link:active {
            transform: translateY(0);
        }
        
        .tool-call .tool-name {
            font-weight: var(--font-weight-semibold);
            color: var(--color-gray-800);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: var(--space-2);
            transition: color var(--transition-fast);
        }
        
        .tool-call .tool-name:hover {
            color: var(--color-primary-600);
        }
        
        .tool-call .tool-name .tool-icon {
            font-size: var(--font-size-lg);
            color: var(--color-warning);
        }
        
        .tool-call .tool-details {
            margin-top: var(--space-4);
            padding-top: var(--space-4);
            border-top: 1px solid var(--color-gray-200);
            display: none;
            animation: slideDown var(--transition-base) ease-out;
        }
        
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .tool-call .tool-details.show {
            display: block;
        }
        
        .tool-call .tool-details .detail-item {
            margin-bottom: var(--space-3);
        }
        
        .tool-call .tool-details .detail-item:last-child {
            margin-bottom: 0;
        }
        
        .tool-call .tool-details .detail-label {
            font-weight: var(--font-weight-semibold);
            color: var(--color-gray-600);
            margin-bottom: var(--space-2);
            font-size: var(--font-size-sm);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .tool-call .tool-details .detail-content {
            background: var(--color-gray-50);
            padding: var(--space-3);
            border-radius: var(--radius-md);
            font-family: var(--font-family-mono);
            font-size: var(--font-size-sm);
            color: var(--color-gray-700);
            word-break: break-all;
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid var(--color-gray-200);
        }
        
        .tool-call .tool-details .detail-content::-webkit-scrollbar {
            width: 4px;
        }
        
        .tool-call .tool-details .detail-content::-webkit-scrollbar-thumb {
            background: var(--color-gray-300);
            border-radius: var(--radius-full);
        }
        
        .tool-call .toggle-icon {
            transition: transform var(--transition-base);
            color: var(--color-gray-400);
        }
        
        .tool-call .toggle-icon.rotated {
            transform: rotate(90deg);
            color: var(--color-primary-600);
        }
        
        /* ============================================
           Chat Input Area
           ============================================ */
        .chat-input {
            padding: var(--space-5) var(--space-6);
            border-top: 1px solid var(--color-gray-200);
            background: #FFFFFF;
            flex-shrink: 0;
        }
        
        .input-group {
            display: flex;
            gap: var(--space-3);
            align-items: center;
        }
        
        .form-control {
            flex: 1;
            border-radius: var(--radius-full);
            padding: var(--space-4) var(--space-5);
            border: 1px solid var(--color-gray-200);
            font-size: var(--font-size-base);
            transition: all var(--transition-fast);
            background: var(--color-gray-100);
            color: var(--color-gray-900);
        }
        
        .form-control:focus {
            outline: none !important;
            border-color: var(--color-primary-500) !important;
            background: var(--color-gray-100);
            color: var(--color-gray-900);
            box-shadow: none !important;
        }
        
        .form-control::placeholder {
            color: var(--color-gray-400);
        }
        
        .btn-send {
            background: var(--color-gray-900);
            border: 1px solid var(--color-gray-900);
            border-radius: var(--radius-full);
            padding: var(--space-4) var(--space-8);
            color: #FFFFFF;
            font-weight: var(--font-weight-semibold);
            transition: all var(--transition-base);
            box-shadow: var(--shadow-sm);
            display: flex;
            align-items: center;
            gap: var(--space-2);
            white-space: nowrap;
        }
        
        .btn-send:hover {
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
            background: var(--color-gray-800);
        }
        
        .btn-send:active {
            transform: translateY(0);
        }
        
        .btn-send:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: var(--shadow-sm);
        }
        
        .btn-clear,
        .btn-new-session {
            border: 1px solid var(--color-gray-200);
            border-radius: var(--radius-full);
            padding: var(--space-4) var(--space-5);
            background: transparent;
            color: var(--color-gray-700);
            font-weight: var(--font-weight-medium);
            transition: all var(--transition-base);
            display: flex;
            align-items: center;
            gap: var(--space-2);
            white-space: nowrap;
        }
        
        .btn-clear:hover,
        .btn-new-session:hover {
            background: var(--color-gray-50);
            border-color: var(--color-gray-300);
            transform: translateY(-1px);
            box-shadow: var(--shadow-sm);
        }
        
        .btn-clear:active,
        .btn-new-session:active {
            transform: translateY(0);
            box-shadow: var(--shadow-sm);
        }
        
        @media (max-width: 768px) {
            .chat-input {
                padding: var(--space-4);
            }
            
            .input-group {
                gap: var(--space-2);
            }
            
            .form-control {
                padding: var(--space-3) var(--space-4);
                font-size: var(--font-size-sm);
            }
            
            .btn-send {
                padding: var(--space-3) var(--space-6);
                font-size: var(--font-size-sm);
            }
            
            .btn-clear,
            .btn-new-session {
                padding: var(--space-3);
                font-size: var(--font-size-sm);
            }
            
            .btn-clear span,
            .btn-new-session span {
                display: none;
            }
        }
        
        /* ============================================
           Timestamp & Loading
           ============================================ */
        .timestamp {
            font-size: var(--font-size-xs);
            color: var(--color-gray-500);
            margin-top: var(--space-2);
            font-weight: var(--font-weight-normal);
        }
        
        .loading {
            display: flex;
            align-items: center;
            gap: var(--space-2);
            font-size: var(--font-size-base);
            color: var(--color-gray-700);
            line-height: 1.5;
        }
        
        .loading-icon {
            animation: spin 1s linear infinite;
            font-size: var(--font-size-sm);
            opacity: 0.7;
        }
        
        .loading-spinner {
            width: 16px;
            height: 16px;
            border: 2px solid var(--color-gray-200);
            border-top-color: var(--color-primary-500);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* ============================================
           Responsive Utilities
           ============================================ */
        @media (max-width: 480px) {
            .message-bubble {
                max-width: 90%;
            }
            
            .tool-call,
            .authorization-status {
                max-width: 95%;
            }
        }
        
        /* ============================================
           Accessibility
           ============================================ */
        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
        
        /* Focus styles for keyboard navigation */
        button:focus-visible,
        .form-control:focus-visible {
            outline: none !important;
            box-shadow: none !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="main-layout">
            <!-- Left Sidebar - Session History -->
            <div class="sidebar-left" id="sidebarLeft">
                <div class="sidebar-header">
                    <h2><i class="bi bi-clock-history"></i> Sessions</h2>
                    <button class="sidebar-toggle-btn" onclick="toggleSidebar('left')" title="Toggle Sidebar">
                        <i class="bi bi-chevron-left"></i>
                    </button>
                </div>
                <div class="sidebar-content">
                    <button class="new-session-btn" onclick="newSession()">
                        <i class="bi bi-plus-lg"></i> New Session
                    </button>
                    <div class="session-list" id="sessionList">
                        <div class="empty-sessions">
                            <i class="bi bi-inbox"></i>
                            <p>No sessions yet</p>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Center - Chat Container -->
            <div class="chat-container">
                <div class="chat-header">
                    <div class="header-content">
                        <button class="sidebar-toggle-btn" onclick="toggleSidebar('left')" title="Toggle Sessions" style="margin-right: var(--space-2);">
                            <i class="bi bi-list"></i>
                        </button>
                        <div class="header-icon">
                            <i class="bi bi-robot"></i>
                        </div>
                        <div>
                            <h1 class="header-title">Open Agent Auth Chat</h1>
                            <p class="header-subtitle">Intelligent Assistant - Always at Your Service</p>
                        </div>
                    </div>
                    <div class="header-actions">
                        <button class="sidebar-toggle-btn" onclick="toggleSidebar('right')" title="Toggle Tool Calls">
                            <i class="bi bi-layout-sidebar-reverse"></i>
                        </button>
                        <button class="header-btn" onclick="clearConversation()" title="Clear Conversation">
                            <i class="bi bi-trash3"></i>
                        </button>
                    </div>
                </div>
                
                <div class="chat-messages" id="chatMessages">
                    <!-- Welcome message -->
                    <div class="message message-assistant">
                        <div class="message-avatar">
                            <i class="bi bi-robot"></i>
                        </div>
                        <div class="message-bubble">
                            Hello! I'm an intelligent assistant that can help you query products, manage orders, and more. How can I help you today?
                        </div>
                    </div>
                </div>
                
                <div class="chat-input">
                    <div class="input-group">
                        <button class="btn-clear" onclick="clearConversation()" title="Clear Conversation">
                            <i class="bi bi-trash3"></i>
                            <span>Clear</span>
                        </button>
                        <input type="text" class="form-control" id="messageInput" 
                               placeholder="Type your message..." 
                               onkeypress="handleKeyPress(event)"
                               aria-label="Message input">
                        <button class="btn-send" onclick="sendMessage()" title="Send message">
                            <i class="bi bi-send-fill"></i>
                            <span>Send</span>
                        </button>
                    </div>
                </div>
            </div>
            
            <!-- Right Sidebar - Tool Call History -->
            <div class="sidebar-right" id="sidebarRight">
                <div class="sidebar-header">
                    <h2><i class="bi bi-gear-fill"></i> Tool Calls</h2>
                    <button class="sidebar-toggle-btn" onclick="toggleSidebar('right')" title="Toggle Sidebar">
                        <i class="bi bi-chevron-right"></i>
                    </button>
                </div>
                <div class="sidebar-content">
                    <div class="tool-call-list" id="toolCallList">
                        <div class="empty-tool-calls">
                            <i class="bi bi-box-seam"></i>
                            <p>No tool calls yet</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        // Page load: Load conversation history and sessions
        document.addEventListener('DOMContentLoaded', async function() {
            await loadConversationHistory();
            await loadSessions();
            await loadToolCalls();
        });

        async function loadConversationHistory() {
            try {
                const response = await fetch('/api/history');
                const messages = await response.json();
                
                if (messages && messages.length > 0) {
                    const chatMessages = document.getElementById('chatMessages');
                    // Clear welcome message
                    chatMessages.innerHTML = '';
                    
                    // Group related messages to avoid duplicate cards
                    // Skip messages that are part of a tool call sequence (they'll be rendered together)
                    const renderedToolCallKeys = new Set();
                    
                    // Render each message
                    messages.forEach(msg => {
                        // Skip tool-related messages that are part of a sequence
                        // We'll render only the final AUTHORIZED message with all information
                        if (msg.toolCall) {
                            const toolKey = `${msg.toolCall.serverName}.${msg.toolCall.toolName}`;
                            
                            // If this is the final AUTHORIZED message with content, render it with all info
                            if (msg.authorizationStatus === 'AUTHORIZED' && msg.content) {
                                // Check if we haven't rendered this tool call yet
                                if (!renderedToolCallKeys.has(toolKey)) {
                                    renderedToolCallKeys.add(toolKey);
                                    addToolCallWithAuthorization(msg.toolCall, msg.toolResult, msg.authorizationStatus, msg.authorizationUrl);
                                }
                            }
                            // Skip INITIATED and intermediate messages
                            else if (msg.authorizationStatus === 'INITIATED' || msg.authorizationStatus === 'REQUIRED') {
                                // Skip these, they'll be replaced by the AUTHORIZED message
                                return;
                            }
                        }
                        // Render authorization status only (if no tool call)
                        else if (msg.authorizationStatus && msg.authorizationStatus !== 'NOT_REQUIRED') {
                            addAuthorizationStatus(msg.authorizationStatus, msg.authorizationUrl);
                        }
                        
                        // Render user or assistant message with content
                        if (msg.content && (msg.role === 'user' || msg.role === 'assistant')) {
                            addMessage(msg.role, msg.content, msg.timestamp);
                        }
                    });
                    
                    chatMessages.scrollTop = chatMessages.scrollHeight;
                    
                    // IMPORTANT: After loading conversation history, check if there's a pending tool request
                    // This happens when user was redirected to login during a tool call
                    await resumePendingToolRequest();
                }
            } catch (error) {
                console.error('Failed to load conversation history:', error);
            }
        }
        
        async function resumePendingToolRequest() {
            try {
                // Show loading indicator first
                const loadingId = addLoading();
                
                try {
                    // Execute the tool call
                    const response = await fetch('/api/resumePendingTool', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        }
                    });
                    
                    const data = await response.json();
                    
                    // Remove loading state
                    removeLoading(loadingId);
                    
                    // If there was no pending tool request, just return
                    if (data && data.content && data.content.includes('No pending tool request')) {
                        return;
                    }
                    
                    // Check if this tool call already exists in the chat
                    // This prevents duplicate cards when resumePendingToolRequest is called
                    // after loadConversationHistory has already rendered the AUTHORIZED message
                    const chatMessages = document.getElementById('chatMessages');
                    const toolKey = data.toolCall ? `${data.toolCall.serverName}.${data.toolCall.toolName}` : null;
                    let toolCallExists = false;
                    
                    if (toolKey) {
                        const existingToolCards = chatMessages.querySelectorAll('.action-card-title');
                        for (const cardTitle of existingToolCards) {
                            const titleText = cardTitle.textContent;
                            if (titleText.includes(toolKey)) {
                                toolCallExists = true;
                                break;
                            }
                        }
                    }
                    
                    // Only add tool call if it doesn't already exist
                    if (!toolCallExists) {
                        // Display tool call with authorization (if both present)
                        if (data.toolCall && data.authorizationStatus && data.authorizationStatus !== 'NOT_REQUIRED') {
                            addToolCallWithAuthorization(data.toolCall, data.toolResult, data.authorizationStatus, data.authorizationUrl);
                        }
                        // Display tool call only (if no authorization needed)
                        else if (data.toolCall) {
                            addToolCall(data.toolCall, data.toolResult);
                        }
                        // Display authorization status only (if no tool call)
                        else if (data.authorizationStatus && data.authorizationStatus !== 'NOT_REQUIRED') {
                            addAuthorizationStatus(data.authorizationStatus, data.authorizationUrl);
                        }
                    }
                    
                    // Display assistant message
                    if (data.content) {
                        addMessage('assistant', data.content);
                    }
                } catch (error) {
                    removeLoading(loadingId);
                    console.error('Failed to execute pending tool request:', error);
                    addMessage('assistant', 'Sorry, an error occurred: ' + error.message);
                }
            } catch (error) {
                console.error('Failed to resume pending tool request:', error);
            }
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            
            if (!message) return;
            
            // Display user message
            addMessage('user', message);
            input.value = '';
            
            // Display loading state
            const loadingId = addLoading();
            
            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ message: message })
                });
                
                const data = await response.json();
                
                // Remove loading state
                removeLoading(loadingId);
                
                // Display tool call with authorization status in unified card
                if (data.toolCall) {
                    addToolCallWithAuthorization(data.toolCall, data.toolResult, data.authorizationStatus, data.authorizationUrl);
                }
                // Display authorization status only (if no tool call but authorization required)
                else if (data.authorizationStatus && data.authorizationStatus !== 'NOT_REQUIRED') {
                    addAuthorizationStatus(data.authorizationStatus, data.authorizationUrl);
                }
                
                // Display assistant message
                addMessage('assistant', data.content);
                
                // Refresh tool calls sidebar
                await loadToolCalls();
                
            } catch (error) {
                removeLoading(loadingId);
                addMessage('assistant', 'Sorry, an error occurred: ' + error.message);
            }
        }

        function addMessage(role, content, timestamp) {
            const chatMessages = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message message-' + role;
            
            // Use provided timestamp or generate current time
            const displayTimestamp = timestamp || new Date().toLocaleTimeString();
            
            // Determine avatar icon based on role
            const avatarIcon = role === 'user' ? 'bi-person-circle' : 'bi-robot';
            
            // Render assistant messages using Markdown
            let renderedContent;
            if (role === 'assistant') {
                renderedContent = marked.parse(content);
            } else {
                renderedContent = escapeHtml(content);
            }
            
            messageDiv.innerHTML = `
                <div class="message-avatar">
                    <i class="bi ${avatarIcon}"></i>
                </div>
                <div class="message-content">
                    <div class="message-bubble">
                        ${renderedContent}
                    </div>
                    <div class="timestamp">${displayTimestamp}</div>
                </div>
            `;
            
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function addToolCall(toolCall, toolResult) {
            const chatMessages = document.getElementById('chatMessages');
            const toolDiv = document.createElement('div');
            toolDiv.className = 'message message-tool';
            
            const cardId = 'action-card-' + Date.now();
            
            toolDiv.innerHTML = `
                <div class="action-card" id="${cardId}">
                    <div class="action-card-header" onclick="toggleActionCard('${cardId}')">
                        <div class="action-card-title">
                            <i class="bi bi-gear-fill icon tool"></i>
                            <span>Tool Call: ${escapeHtml(toolCall.serverName)}.${escapeHtml(toolCall.toolName)}</span>
                        </div>
                        <i class="bi bi-chevron-right action-card-toggle"></i>
                    </div>
                    <div class="action-card-body">
                        <div class="action-card-section">
                            <div class="action-card-section-title">Server</div>
                            <div class="action-card-section-content">${escapeHtml(toolCall.serverName)}</div>
                        </div>
                        <div class="action-card-section">
                            <div class="action-card-section-title">Tool Name</div>
                            <div class="action-card-section-content">${escapeHtml(toolCall.toolName)}</div>
                        </div>
                        <div class="action-card-section">
                            <div class="action-card-section-title">Arguments</div>
                            <div class="action-card-section-content">${escapeHtml(toolCall.arguments)}</div>
                        </div>
                        ${toolResult ? `
                        <div class="action-card-section">
                            <div class="action-card-section-title">Result</div>
                            <div class="action-card-section-content">${escapeHtml(toolResult)}</div>
                        </div>
                        ` : ''}
                    </div>
                </div>
            `;
            
            chatMessages.appendChild(toolDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
        
        function addToolCallWithAuthorization(toolCall, toolResult, authorizationStatus, authorizationUrl) {
            const chatMessages = document.getElementById('chatMessages');
            const toolDiv = document.createElement('div');
            toolDiv.className = 'message message-tool';
            
            const cardId = 'action-card-' + Date.now();
            
            // Determine authorization info - default to NOT_REQUIRED if not provided
            const authStatus = authorizationStatus || 'NOT_REQUIRED';
            
            // Determine card status class and icon
            let statusClass = '';
            let authIcon = '';
            let authText = '';
            let authLink = '';
            let showAuthSection = false;
            
            switch (authStatus) {
                case 'REQUIRED':
                    authIcon = 'bi-lock-fill';
                    authText = 'Authorization Required';
                    statusClass = 'required';
                    authLink = authorizationUrl ? 
                        `<a href="${escapeHtml(authorizationUrl)}" target="_blank" class="action-card-auth-link"><i class="bi bi-box-arrow-up-right"></i> Complete Authorization</a>` : '';
                    showAuthSection = true;
                    break;
                case 'INITIATED':
                    authIcon = 'bi-hourglass-split';
                    authText = 'Authorization Pending';
                    statusClass = 'initiated';
                    authLink = authorizationUrl ? 
                        `<a href="${escapeHtml(authorizationUrl)}" target="_blank" class="action-card-auth-link"><i class="bi bi-box-arrow-up-right"></i> Complete Authorization</a>` : '';
                    showAuthSection = true;
                    break;
                case 'AUTHORIZED':
                    authIcon = 'bi-check-circle-fill';
                    authText = 'Authorized';
                    statusClass = 'authorized';
                    showAuthSection = true;
                    break;
                case 'DENIED':
                    authIcon = 'bi-x-circle-fill';
                    authText = 'Authorization Denied';
                    statusClass = 'denied';
                    showAuthSection = true;
                    break;
                case 'FAILED':
                    authIcon = 'bi-exclamation-triangle-fill';
                    authText = 'Authorization Failed';
                    statusClass = 'failed';
                    showAuthSection = true;
                    break;
                default:
                    // NOT_REQUIRED or other - no auth section needed
                    statusClass = '';
                    showAuthSection = false;
            }
            
            // Build the authorization section HTML
            const authSectionHtml = showAuthSection ? `
                <div class="action-card-section auth-section">
                    <div class="action-card-section-title">
                        <i class="bi bi-shield-lock"></i> Authorization
                    </div>
                    <div class="action-card-section-content auth-status-content">
                        <div class="auth-status-badge ${statusClass}">
                            <i class="bi ${authIcon}"></i>
                            <span>${authText}</span>
                        </div>
                    </div>
                </div>
            ` : '';
            
            toolDiv.innerHTML = `
                <div class="action-card ${statusClass}" id="${cardId}">
                    <div class="action-card-header" onclick="toggleActionCard('${cardId}')">
                        <div class="action-card-title">
                            <i class="bi bi-gear-fill icon tool"></i>
                            <span>${escapeHtml(toolCall.serverName)}.${escapeHtml(toolCall.toolName)}</span>
                            ${showAuthSection ? `<span class="auth-badge ${statusClass}"><i class="bi ${authIcon}"></i></span>` : ''}
                        </div>
                        <i class="bi bi-chevron-right action-card-toggle"></i>
                    </div>
                    ${authLink ? `<div class="action-card-auth-external">${authLink}</div>` : ''}
                    <div class="action-card-body">
                        ${authSectionHtml}
                        <div class="action-card-section">
                            <div class="action-card-section-title">
                                <i class="bi bi-server"></i> Server
                            </div>
                            <div class="action-card-section-content">${escapeHtml(toolCall.serverName)}</div>
                        </div>
                        <div class="action-card-section">
                            <div class="action-card-section-title">
                                <i class="bi bi-tools"></i> Tool
                            </div>
                            <div class="action-card-section-content">${escapeHtml(toolCall.toolName)}</div>
                        </div>
                        <div class="action-card-section">
                            <div class="action-card-section-title">
                                <i class="bi bi-code-slash"></i> Arguments
                            </div>
                            <div class="action-card-section-content">${escapeHtml(toolCall.arguments)}</div>
                        </div>
                        ${toolResult ? `
                        <div class="action-card-section">
                            <div class="action-card-section-title">
                                <i class="bi bi-terminal"></i> Result
                            </div>
                            <div class="action-card-section-content result-content">${escapeHtml(toolResult)}</div>
                        </div>
                        ` : ''}
                    </div>
                </div>
            `;
            
            chatMessages.appendChild(toolDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
        
        function toggleActionCard(cardId) {
            const card = document.getElementById(cardId);
            const body = card.querySelector('.action-card-body');
            const toggle = card.querySelector('.action-card-toggle');
            const iconElement = toggle.querySelector('i');
            
            if (body.classList.contains('show')) {
                body.classList.remove('show');
                toggle.classList.remove('rotated');
                iconElement.classList.remove('bi-chevron-down');
                iconElement.classList.add('bi-chevron-right');
            } else {
                body.classList.add('show');
                toggle.classList.add('rotated');
                iconElement.classList.remove('bi-chevron-right');
                iconElement.classList.add('bi-chevron-down');
            }
        }

        function addLoading() {
            const chatMessages = document.getElementById('chatMessages');
            const loadingId = 'loading-' + Date.now();
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message message-assistant';
            loadingDiv.id = loadingId;
            
            loadingDiv.innerHTML = `
                <div class="message-avatar">
                    <i class="bi bi-robot"></i>
                </div>
                <div class="message-content">
                    <div class="message-bubble">
                        <div class="loading">
                            <i class="bi bi-arrow-repeat loading-icon"></i>
                            <span>AI is thinking...</span>
                        </div>
                    </div>
                </div>
            `;
            
            chatMessages.appendChild(loadingDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            
            return loadingId;
        }

        function removeLoading(loadingId) {
            const loadingDiv = document.getElementById(loadingId);
            if (loadingDiv) {
                loadingDiv.remove();
            }
        }

        async function clearConversation() {
            try {
                await fetch('/api/clear', {
                    method: 'POST'
                });
                
                const chatMessages = document.getElementById('chatMessages');
                chatMessages.innerHTML = `
                    <div class="message message-assistant">
                        <div class="message-bubble">
                            Conversation cleared. Hello! I'm an intelligent assistant that can help you query products, manage orders, and more. How can I help you today?
                        </div>
                    </div>
                `;
                
            } catch (error) {
                alert('Failed to clear conversation: ' + error.message);
            }
        }

        async function newSession() {
            try {
                await fetch('/api/newSession', {
                    method: 'POST'
                });
                
                const chatMessages = document.getElementById('chatMessages');
                chatMessages.innerHTML = `
                    <div class="message message-assistant">
                        <div class="message-bubble">
                            New session created. Hello! I'm an intelligent assistant that can help you query products, manage orders, and more. How can I help you today?
                        </div>
                    </div>
                `;
                
                // Reload session list to show the newly created session
                await loadSessions();
                
            } catch (error) {
                alert('Failed to create new session: ' + error.message);
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // ============================================
        // Sidebar Toggle Functions
        // ============================================
        function toggleSidebar(side) {
            const sidebar = document.getElementById('sidebar' + side.charAt(0).toUpperCase() + side.slice(1));
            const toggleBtn = sidebar.querySelector('.sidebar-toggle-btn i');
            
            if (sidebar.classList.contains('collapsed')) {
                sidebar.classList.remove('collapsed');
                if (side === 'left') {
                    toggleBtn.classList.remove('bi-chevron-right');
                    toggleBtn.classList.add('bi-chevron-left');
                } else {
                    toggleBtn.classList.remove('bi-chevron-left');
                    toggleBtn.classList.add('bi-chevron-right');
                }
            } else {
                sidebar.classList.add('collapsed');
                if (side === 'left') {
                    toggleBtn.classList.remove('bi-chevron-left');
                    toggleBtn.classList.add('bi-chevron-right');
                } else {
                    toggleBtn.classList.remove('bi-chevron-right');
                    toggleBtn.classList.add('bi-chevron-left');
                }
            }
        }
        
        // ============================================
        // Session Management Functions
        // ============================================
        async function loadSessions() {
            try {
                const response = await fetch('/api/sessions');
                const sessions = await response.json();
                
                const sessionList = document.getElementById('sessionList');
                
                if (sessions && sessions.length > 0) {
                    sessionList.innerHTML = sessions.map(session => `
                        <div class="session-item ${session.active ? 'active' : ''}" onclick="selectSession('${session.id}')" data-session-id="${session.id}">
                            <div class="session-item-title">${escapeHtml(session.title || 'Untitled Session')}</div>
                            <div class="session-item-meta">
                                <div class="session-item-time">
                                    <i class="bi bi-clock"></i>
                                    ${formatTime(session.createdAt)}
                                </div>
                                <div class="session-item-actions">
                                    <button class="session-action-btn delete" onclick="event.stopPropagation(); deleteSession('${session.id}')" title="Delete">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    `).join('');
                } else {
                    sessionList.innerHTML = `
                        <div class="empty-sessions">
                            <i class="bi bi-inbox"></i>
                            <p>No sessions yet</p>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('Failed to load sessions:', error);
            }
        }
        
        async function selectSession(sessionId) {
            try {
                await fetch('/api/sessions/select', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ sessionId: sessionId })
                });
                
                // Update active state
                document.querySelectorAll('.session-item').forEach(item => {
                    item.classList.remove('active');
                });
                document.querySelector(`[data-session-id="${sessionId}"]`)?.classList.add('active');
                
                // Reload conversation history
                await loadConversationHistory();
                await loadToolCalls();
            } catch (error) {
                console.error('Failed to select session:', error);
            }
        }
        
        async function deleteSession(sessionId) {
            if (!confirm('Are you sure you want to delete this session?')) {
                return;
            }
            
            try {
                await fetch('/api/sessions/' + sessionId, {
                    method: 'DELETE'
                });
                
                await loadSessions();
            } catch (error) {
                console.error('Failed to delete session:', error);
                alert('Failed to delete session');
            }
        }
        
        function formatTime(timestamp) {
            if (!timestamp) return '';
            const date = new Date(timestamp);
            const now = new Date();
            const diff = now - date;
            
            if (diff < 60000) return 'Just now';
            if (diff < 3600000) return Math.floor(diff / 60000) + 'm ago';
            if (diff < 86400000) return Math.floor(diff / 3600000) + 'h ago';
            if (diff < 604800000) return Math.floor(diff / 86400000) + 'd ago';
            
            return date.toLocaleDateString();
        }
        
        // ============================================
        // Tool Call History Functions
        // ============================================
        async function loadToolCalls() {
            const toolCallList = document.getElementById('toolCallList');
            
            // Show loading state
            toolCallList.innerHTML = `
                <div class="loading-tool-calls">
                    <i class="bi bi-arrow-repeat loading-icon"></i>
                    <span>Loading tool calls...</span>
                </div>
            `;
            
            // Record start time to ensure minimum display duration
            const startTime = Date.now();
            const MIN_DISPLAY_TIME = 500; // Minimum 500ms display time
            
            try {
                const response = await fetch('/api/toolCalls');
                const toolCalls = await response.json();
                
                // Calculate remaining time to meet minimum display duration
                const elapsedTime = Date.now() - startTime;
                const remainingTime = Math.max(0, MIN_DISPLAY_TIME - elapsedTime);
                
                // Wait for minimum display time if needed
                if (remainingTime > 0) {
                    await new Promise(resolve => setTimeout(resolve, remainingTime));
                }
                
                if (toolCalls && toolCalls.length > 0) {
                    toolCallList.innerHTML = toolCalls.map(toolCall => `
                        <div class="tool-call-item">
                            <div class="tool-call-item-header" onclick="toggleToolCallItem(this)">
                                <div class="tool-call-item-title">
                                    <i class="bi bi-gear-fill tool-icon"></i>
                                    <span class="tool-name">${escapeHtml(toolCall.toolName)}</span>
                                </div>
                                <div class="tool-call-item-status ${getStatusClass(toolCall.status)}">
                                    ${escapeHtml(toolCall.status)}
                                </div>
                                <i class="bi bi-chevron-right tool-call-item-toggle"></i>
                            </div>
                            <div class="tool-call-item-body">
                                <div class="tool-call-detail">
                                    <div class="tool-call-detail-label">Server</div>
                                    <div class="tool-call-detail-content">${escapeHtml(toolCall.serverName)}</div>
                                </div>
                                <div class="tool-call-detail">
                                    <div class="tool-call-detail-label">Arguments</div>
                                    <div class="tool-call-detail-content">${escapeHtml(JSON.stringify(toolCall.arguments))}</div>
                                </div>
                                ${toolCall.result ? `
                                <div class="tool-call-detail">
                                    <div class="tool-call-detail-label">Result</div>
                                    <div class="tool-call-detail-content">${escapeHtml(toolCall.result)}</div>
                                </div>
                                ` : ''}
                                <div class="tool-call-timestamp">
                                    <i class="bi bi-clock"></i>
                                    ${formatTime(toolCall.timestamp)}
                                </div>
                            </div>
                        </div>
                    `).join('');
                } else {
                    toolCallList.innerHTML = `
                        <div class="empty-tool-calls">
                            <i class="bi bi-box-seam"></i>
                            <p>No tool calls yet</p>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('Failed to load tool calls:', error);
                // Ensure minimum display time even for errors
                const elapsedTime = Date.now() - startTime;
                const remainingTime = Math.max(0, MIN_DISPLAY_TIME - elapsedTime);
                
                if (remainingTime > 0) {
                    await new Promise(resolve => setTimeout(resolve, remainingTime));
                }
                
                toolCallList.innerHTML = `
                    <div class="empty-tool-calls">
                        <i class="bi bi-exclamation-triangle"></i>
                        <p>Failed to load tool calls</p>
                    </div>
                `;
            }
        }
        
        function toggleToolCallItem(header) {
            const body = header.nextElementSibling;
            const toggle = header.querySelector('.tool-call-item-toggle');
            
            if (body.classList.contains('show')) {
                body.classList.remove('show');
                toggle.classList.remove('rotated');
            } else {
                body.classList.add('show');
                toggle.classList.add('rotated');
            }
        }
        
        function getStatusClass(status) {
            switch (status?.toUpperCase()) {
                case 'SUCCESS':
                case 'AUTHORIZED':
                    return 'success';
                case 'ERROR':
                case 'FAILED':
                case 'DENIED':
                    return 'error';
                case 'PENDING':
                case 'REQUIRED':
                case 'INITIATED':
                    return 'pending';
                default:
                    return 'pending';
            }
        }
        
        function addAuthorizationStatus(status, authorizationUrl) {
            const chatMessages = document.getElementById('chatMessages');
            const authDiv = document.createElement('div');
            authDiv.className = 'message message-tool';
            
            let icon = '';
            let text = '';
            let linkHtml = '';
            let statusClass = '';
            
            switch (status) {
                case 'REQUIRED':
                    icon = 'bi-lock-fill';
                    text = 'Authorization Required';
                    statusClass = 'required';
                    linkHtml = authorizationUrl ? 
                        `<a href="${escapeHtml(authorizationUrl)}" target="_blank" class="action-card-auth-link"><i class="bi bi-box-arrow-up-right"></i> Click to Complete Authorization</a>` : '';
                    break;
                case 'INITIATED':
                    icon = 'bi-hourglass-split';
                    text = 'Authorization Initiated';
                    statusClass = 'initiated';
                    linkHtml = authorizationUrl ? 
                        `<a href="${escapeHtml(authorizationUrl)}" target="_blank" class="action-card-auth-link"><i class="bi bi-box-arrow-up-right"></i> Click to Complete Authorization</a>` : '';
                    break;
                case 'AUTHORIZED':
                    icon = 'bi-check-circle-fill';
                    text = 'Authorized';
                    statusClass = 'authorized';
                    break;
                case 'DENIED':
                    icon = 'bi-x-circle-fill';
                    text = 'Authorization Denied';
                    statusClass = 'denied';
                    break;
                case 'FAILED':
                    icon = 'bi-exclamation-triangle-fill';
                    text = 'Authorization Failed';
                    statusClass = 'failed';
                    break;
                default:
                    icon = 'bi-info-circle-fill';
                    text = 'Authorization Status: ' + status;
                    statusClass = '';
            }
            
            authDiv.innerHTML = `
                <div class="action-card ${statusClass}">
                    <div class="action-card-header">
                        <div class="action-card-title">
                            <i class="bi ${icon} icon auth"></i>
                            <span>${text}</span>
                        </div>
                    </div>
                    ${linkHtml}
                </div>
            `;
            
            chatMessages.appendChild(authDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
    </script>
</body>
</html>
