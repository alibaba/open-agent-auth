server:
  port: 8081
  servlet:
    session:
      timeout: 3600
      tracking-modes: cookie
      cookie:
        http-only: true
        secure: false
        same-site: lax
        max-age: 7200

spring:
  application:
    name: sample-agent
  
  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html

open-agent-auth:
  enabled: true

  # Infrastructure: only trust-domain is required; keys, JWKS consumers,
  # service-discovery entries are all inferred from roles + peers.
  infrastructures:
    trust-domain: wimse://default.trust.domain

  # Peers: declare the services this agent communicates with.
  # Each peer automatically generates JWKS consumer + service-discovery entries.
  peers:
    agent-user-idp:
      issuer: http://localhost:8083
    agent-idp:
      issuer: http://localhost:8082
    authorization-server:
      issuer: http://localhost:8085
  
  # Capabilities configuration
  capabilities:
    oauth2-client:
      enabled: true
      client-id: sample-agent
      client-secret: sample-agent-secret
      authentication:
        enabled: true
      callback:
        enabled: true
    
    operation-authorization:
      enabled: true
      prompt-encryption:
        enabled: true
      prompt-protection:
        enabled: true
        encryption-enabled: true
        sanitization-level: MEDIUM
      agent-context:
        default-client: sample-agent-client
        default-channel: web
        default-language: zh-CN
        default-platform: sample-agent.platform
        default-device-fingerprint: sample-device
      authorization:
        require-user-interaction: false
        expiration-seconds: 3600
  
  # Roles configuration
  roles:
    agent:
      enabled: true
      instance-id: agent-1
      issuer: http://localhost:8081

# Agent configuration
agent:
  tools:
    mcp:
      enabled: true
  mcp-servers:
    - name: shopping
      url: http://localhost:8086/mcp
      description: "Shopping service MCP Server"
      enabled: true
  api-servers:
    - name: payment
      baseUrl: http://localhost:8085/api
      description: "Payment service API"
      authToken: ${PAYMENT_API_TOKEN:}

  # Mock LLM configuration
  mock:
    enabled: false
    strategies:
      - name: shopping-search
        intent: "search products"
        keywords: [ "search", "find", "look for", "show" ]
        tool-server: "shopping"
        tool-name: "search_products"
        param-rules:
          - param: "keywords"
            source: "user_input"
            pattern: "search\\s+(.+)"
        response-template: "Found the following products: {result}"
        error-template: "Search failed: {error}"
      - name: shopping-purchase
        intent: "purchase products"
        keywords: [ "purchase", "buy", "order" ]
        tool-server: "shopping"
        tool-name: "purchase_product"
        param-rules:
          - param: "productId"
            source: "user_input"
            pattern: "purchase\\s+(\\w+)"
          - param: "quantity"
            defaultValue: "1"
        response-template: "Successfully purchased {productId}, quantity: {quantity}"
        error-template: "Purchase failed: {error}"
      - name: greeting
        intent: "greeting"
        keywords: [ "hello", "hi", "hey" ]
        no-tool: true
        response: "Hello! I can help you search for products and make purchases."
      - name: default
        intent: "default"
        no-tool: true
        response: "I didn't understand your request. Please try searching for products or making a purchase."

# Qwen configuration
qwen:
  model: qwen3-coder-plus
  timeout: 120

logging:
  level:
    root: INFO
    com.alibaba.openagentauth: DEBUG
    io.modelcontextprotocol: DEBUG
    org.springframework.boot.web.servlet.error: DEBUG
    org.springframework.web.servlet: DEBUG
    jakarta.servlet: DEBUG