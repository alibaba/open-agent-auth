server:
  port: 8085

spring:
  application:
    name: sample-authorization-server

open-agent-auth:
  enabled: true

  # Infrastructure: only trust-domain is required; keys, JWKS consumers,
  # service-discovery entries are all inferred from roles + peers.
  infrastructures:
    trust-domain: wimse://default.trust.domain

  # Peers: declare the services this AS communicates with.
  # Each peer automatically generates JWKS consumer + service-discovery entries.
  peers:
    agent-idp:
      issuer: http://localhost:8082
    agent-user-idp:
      issuer: http://localhost:8083
    as-user-idp:
      issuer: http://localhost:8084
    agent:
      issuer: http://localhost:8081
    resource-server:
      issuer: http://localhost:8086
  
  # Capabilities configuration
  capabilities:
    oauth2-server:
      enabled: true
      token:
        access-token-expiry: 3600
        refresh-token-expiry: 2592000
        id-token-expiry: 3600
        authorization-code-expiry: 600
      auto-register-clients:
        enabled: true
        clients:
          - client-name: sample-agent
            client-id: sample-agent
            client-secret: sample-agent-secret
            redirect-uris:
              - http://localhost:8081/oauth/callback
              - http://localhost:8081/callback
            grant-types:
              - authorization_code
            response-types:
              - code
            token-endpoint-auth-method: client_secret_basic
            scopes:
              - openid
              - profile
              - email
    oauth2-client:
      enabled: true
      client-id: sample-authorization-server-id
      client-secret: sample-authorization-server-secret
      callback:
        enabled: true
        endpoint: /callback

    operation-authorization:
      enabled: true
      prompt-encryption:
        enabled: true

    audit:
      enabled: true
      provider: logging
  
  # Admin console configuration (enabled for sample/demo purposes)
  admin:
    enabled: true
    access-control:
      enabled: false

  # Roles configuration
  roles:
    authorization-server:
      enabled: true
      instance-id: authorization-server-1
      issuer: http://localhost:8085
  
# LLM-based operation text renderer configuration (uses qwencode-sdk, consistent with sample-agent)
# Set 'enabled: true' to use Qwen LLM for generating human-readable operation descriptions
# on the consent page. When disabled, the framework uses the default PatternBasedOperationTextRenderer.
sample:
  llm-renderer:
    enabled: true
    # Qwen model to use. Consistent with sample-agent's default model.
    model: qwen3-coder-flash
    # Timeout in seconds for LLM calls
    timeout: 120

logging:
  level:
    com.alibaba.openagentauth: DEBUG
    org.springframework.web: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"