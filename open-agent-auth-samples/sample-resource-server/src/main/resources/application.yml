server:
  port: 8086

spring:
  application:
    name: sample-resource-server

open-agent-auth:
  enabled: true

  # Role configuration
  roles:
    resource-server:
      enabled: true
      issuer: http://localhost:8086

  # Peer services (auto-configures JWKS consumers + service discovery + keys)
  peers:
    agent-idp:
      issuer: http://localhost:8082
    authorization-server:
      issuer: http://localhost:8085

# MCP Server Configuration
mcp:
  server:
    name: shopping-mcp-server

# Logging configuration
logging:
  level:
    root: INFO
    com.alibaba.openagentauth: DEBUG
    com.alibaba.openagentauth.sample.rs: DEBUG
    io.modelcontextprotocol: DEBUG
    org.springframework.web: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"