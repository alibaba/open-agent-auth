server:
  port: 8082

spring:
  application:
    name: sample-agent-idp

open-agent-auth:
  enabled: true

  # Role configuration
  roles:
    agent-idp:
      enabled: true
      issuer: http://localhost:8082

  # Peer services (auto-configures JWKS consumers + service discovery)
  peers:
    agent-user-idp:
      issuer: http://localhost:8083

  # Admin console configuration (enabled for sample/demo purposes)
  admin:
    enabled: true
    access-control:
      enabled: false

  # Capabilities configuration
  capabilities:
    workload-identity:
      enabled: true
    oauth2-client:
      enabled: true
      client-id: sample-agent-idp
      client-secret: sample-agent-idp-secret
      callback:
        enabled: true
        endpoint: /callback

logging:
  level:
    root: INFO
    com.alibaba.openagentauth: DEBUG
    org.springframework.web: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"